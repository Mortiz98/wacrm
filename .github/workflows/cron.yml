name: Cron Jobs

on:
  schedule:
    # Automatizaciones: cada 5 minutos
    - cron: '*/5 * * * *'
    # Flows: cada hora
    - cron: '0 * * * *'
    # Gym cron: 5:53 PM Colombia (22:53 UTC)
    - cron: '53 22 * * *'
  workflow_dispatch:

jobs:
  automations-cron:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *'
    steps:
      - name: Trigger automations cron
        run: |
          curl -f -X GET "${{ secrets.PRODUCTION_URL }}/api/automations/cron" \
            -H "x-cron-secret: ${{ secrets.AUTOMATION_CRON_SECRET }}" \
            -H "Content-Type: application/json"

  flows-cron:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *'
    steps:
      - name: Trigger flows cron
        run: |
          curl -f -X GET "${{ secrets.PRODUCTION_URL }}/api/flows/cron" \
            -H "x-cron-secret: ${{ secrets.AUTOMATION_CRON_SECRET }}" \
            -H "Content-Type: application/json"

  gym-cron:
    runs-on: ubuntu-latest
    if: github.event.schedule == '53 22 * * *'
    steps:
      - name: Trigger gym cron
        run: |
          curl -f -X GET "${{ secrets.PRODUCTION_URL }}/api/gym/cron" \
            -H "x-cron-secret: ${{ secrets.AUTOMATION_CRON_SECRET }}" \
            -H "Content-Type: application/json"